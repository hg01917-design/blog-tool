<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 자동 생성 도구</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.5rem;
        }
        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        .step {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .step.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background: #334155;
            border-radius: 50%;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.8rem;
            background: none;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }
        .back-btn:hover { border-color: #6366f1; color: #c7d2fe; }
        .back-btn::before { content: '←'; }

        /* 선택 버튼 그리드 */
        .sel-grid {
            display: grid;
            gap: 0.7rem;
        }
        .sel-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
        .sel-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
        .sel-grid.cols-1 { grid-template-columns: 1fr; max-width: 320px; }
        .sel-btn {
            padding: 1rem 0.8rem;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .sel-btn .sub {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            color: #64748b;
            margin-top: 0.3rem;
        }
        .sel-btn:hover { border-color: #6366f1; color: #c7d2fe; }
        .sel-btn:hover .sub { color: #94a3b8; }
        .sel-btn.selected {
            border-color: #6366f1;
            background: #312e81;
            color: #e0e7ff;
        }
        .sel-btn.selected .sub { color: #a5b4fc; }
        .sel-btn.sel-tistory.selected { border-color: #f97316; background: #431407; color: #fed7aa; }
        .sel-btn.sel-naver.selected { border-color: #22c55e; background: #052e16; color: #bbf7d0; }
        .sel-btn.sel-wordpress.selected { border-color: #3b82f6; background: #172554; color: #bfdbfe; }

        /* 선택 요약 breadcrumb */
        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .breadcrumb .crumb {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .crumb-tistory { background: #431407; color: #fed7aa; }
        .crumb-naver { background: #052e16; color: #bbf7d0; }
        .crumb-wordpress { background: #172554; color: #bfdbfe; }
        .crumb-default { background: #312e81; color: #c7d2fe; }
        .breadcrumb .sep { color: #475569; }

        /* 키워드 입력 */
        .keyword-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }
        .keyword-input:focus { border-color: #6366f1; }
        .generate-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .generate-btn:hover { opacity: 0.9; }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        /* 결과 영역 */
        .result-section { display: none; }
        .result-section.visible { display: block; }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .result-header h2 { font-size: 1.1rem; color: #f8fafc; }
        .badges { display: flex; gap: 0.4rem; }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-tistory { background: #431407; color: #fed7aa; }
        .badge-naver { background: #052e16; color: #bbf7d0; }
        .badge-wordpress { background: #172554; color: #bfdbfe; }
        .badge-default { background: #312e81; color: #c7d2fe; }
        .result-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #334155;
        }
        .result-body {
            line-height: 1.8;
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        .result-body h2 { font-size: 1.15rem; color: #f8fafc; margin: 1.2rem 0 0.6rem; }
        .result-body h3 { font-size: 1.05rem; color: #e2e8f0; margin: 1rem 0 0.5rem; }
        .result-body p { margin-bottom: 0.8rem; }
        .result-body ul, .result-body ol { margin: 0.5rem 0 0.8rem 1.5rem; }
        .result-body li { margin-bottom: 0.3rem; }
        .result-body strong { color: #f8fafc; }
        .result-tags {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid #334155;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.3rem;
        }
        .result-tags span {
            display: inline-block;
            background: #1e1b4b;
            color: #a5b4fc;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            margin: 0.2rem;
        }
        .copy-tags-btn {
            margin-left: 0.5rem;
            padding: 0.25rem 0.6rem;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-tags-btn:hover { border-color: #6366f1; color: #c7d2fe; }
        .image-section { text-align: center; margin-bottom: 1rem; }
        .image-section img {
            max-width: 100%;
            border-radius: 10px;
            border: 1px solid #334155;
        }
        .title-candidates {
            margin-top: 1rem;
            padding: 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        .title-candidates h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .title-candidates p {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            line-height: 1.6;
        }
        .action-bar {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .action-btn {
            flex: 1;
            padding: 0.65rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .action-btn:hover { border-color: #6366f1; color: #c7d2fe; }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #22c55e;
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 600px) {
            .sel-grid.cols-3 { grid-template-columns: 1fr; }
            .sel-grid.cols-2 { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Blog Auto Generator</h1>
            <p>키워드를 입력하면 AI가 SEO 최적화된 블로그 글과 이미지를 자동 생성합니다</p>
        </header>

        <div class="card" id="wizardCard">
            <!-- Step 1: 플랫폼 선택 -->
            <div class="step active" id="step1">
                <div class="step-label"><span class="step-num">1</span> 플랫폼 선택</div>
                <div class="sel-grid cols-3">
                    <button class="sel-btn sel-tistory" onclick="selectPlatform('tistory')">
                        티스토리
                        <span class="sub">구글·다음 검색 최적화</span>
                    </button>
                    <button class="sel-btn sel-naver" onclick="selectPlatform('naver')">
                        네이버
                        <span class="sub">네이버 검색 최적화</span>
                    </button>
                    <button class="sel-btn sel-wordpress" onclick="selectPlatform('wordpress')">
                        워드프레스
                        <span class="sub">구글 SEO 최적화</span>
                    </button>
                </div>
            </div>

            <!-- Step 2: 주제/유형 선택 -->
            <div class="step" id="step2">
                <button class="back-btn" onclick="goBack(1)">이전</button>
                <div class="breadcrumb" id="bc2"></div>
                <div class="step-label"><span class="step-num">2</span> <span id="step2Label">주제 선택</span></div>
                <div id="step2Options"></div>
            </div>

            <!-- Step 3: 글쓰기 모드 (티스토리·네이버만) -->
            <div class="step" id="step3">
                <button class="back-btn" onclick="goBack(2)">이전</button>
                <div class="breadcrumb" id="bc3"></div>
                <div class="step-label"><span class="step-num">3</span> 글쓰기 모드</div>
                <div class="sel-grid cols-2">
                    <button class="sel-btn" onclick="selectMode('casual')">
                        체험형
                        <span class="sub">직접 해본 경험 기반</span>
                    </button>
                    <button class="sel-btn" onclick="selectMode('informative')">
                        정보성
                        <span class="sub">객관적 정보 전달</span>
                    </button>
                </div>
            </div>

            <!-- Step 4: 키워드 입력 -->
            <div class="step" id="step4">
                <button class="back-btn" id="step4Back" onclick="goBack(3)">이전</button>
                <div class="breadcrumb" id="bc4"></div>
                <div class="step-label"><span class="step-num" id="step4Num">4</span> 키워드 입력</div>
                <input type="text" class="keyword-input" id="keyword" placeholder="예: 서울 카페 추천, 재택근무 팁 ..." autofocus>
                <div class="error-msg" id="errorMsg"></div>
                <button class="generate-btn" id="generateBtn" onclick="generate()">글 생성하기</button>
            </div>
        </div>

        <!-- 결과 -->
        <div class="result-section" id="resultSection">
            <div class="card">
                <div class="result-header">
                    <h2>생성 결과</h2>
                    <div class="badges" id="resultBadges"></div>
                </div>
                <div class="image-section" id="imageSection" style="display:none;">
                    <img id="resultImage" src="" alt="생성된 이미지">
                </div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-body" id="resultBody"></div>
                <div class="result-tags" id="resultTags"></div>
                <div class="title-candidates" id="titleCandidates" style="display:none;">
                    <h3>제목 후보</h3>
                    <div id="titleCandidatesContent"></div>
                </div>
                <div class="action-bar">
                    <button class="action-btn" onclick="copyTitle()">제목 복사</button>
                    <button class="action-btn" onclick="copyFullHTML()">전체 복사 (썸네일+본문)</button>
                    <button class="action-btn" onclick="copyBody()">본문만 복사 (HTML)</button>
                    <button class="action-btn" onclick="copyBodyText()">본문 복사 (텍스트)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let platform = '';
        let category = '';
        let subtype = '';
        let tone = 'informative';
        let currentData = {};

        const platformLabels = { tistory: '티스토리', naver: '네이버', wordpress: '워드프레스' };
        const platformCrumbClass = { tistory: 'crumb-tistory', naver: 'crumb-naver', wordpress: 'crumb-wordpress' };
        const platformBadgeClass = { tistory: 'badge-tistory', naver: 'badge-naver', wordpress: 'badge-wordpress' };

        const topicLabels = {
            it: 'IT/테크', travel: '여행',
            living: '살림블로그',
            review: '리뷰', walkthrough: '공략', tips: '팁/랭킹'
        };

        const modeLabels = { casual: '체험형', informative: '정보성' };

        function showStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        function buildBreadcrumb(items) {
            return items.map((item, i) => {
                const cls = item.cls || 'crumb-default';
                const sep = i < items.length - 1 ? '<span class="sep">›</span>' : '';
                return `<span class="crumb ${cls}">${item.text}</span>${sep}`;
            }).join('');
        }

        function selectPlatform(p) {
            platform = p;
            category = '';
            subtype = '';
            tone = 'informative';

            const bc = buildBreadcrumb([{ text: platformLabels[p], cls: platformCrumbClass[p] }]);

            if (p === 'tistory') {
                document.getElementById('step2Label').textContent = '주제 선택';
                document.getElementById('step2Options').innerHTML = `
                    <div class="sel-grid cols-2">
                        <button class="sel-btn" onclick="selectTopic('it')">IT / 테크<span class="sub">기술·가젯·앱 정보</span></button>
                        <button class="sel-btn" onclick="selectTopic('travel')">여행<span class="sub">여행지·코스·맛집</span></button>
                    </div>`;
                document.getElementById('bc2').innerHTML = bc;
                showStep(2);

            } else if (p === 'naver') {
                category = 'living';
                document.getElementById('step2Label').textContent = '블로그 유형';
                document.getElementById('step2Options').innerHTML = `
                    <div class="sel-grid cols-1">
                        <button class="sel-btn selected" onclick="selectTopic('living')">살림블로그<span class="sub">퇴근후 살림 · 절약 생활</span></button>
                    </div>`;
                document.getElementById('bc2').innerHTML = bc;
                showStep(2);

            } else if (p === 'wordpress') {
                document.getElementById('step2Label').textContent = '글 유형 선택';
                document.getElementById('step2Options').innerHTML = `
                    <div class="sel-grid cols-3">
                        <button class="sel-btn" onclick="selectTopic('review')">리뷰<span class="sub">제품·서비스 리뷰</span></button>
                        <button class="sel-btn" onclick="selectTopic('walkthrough')">공략<span class="sub">단계별 가이드</span></button>
                        <button class="sel-btn" onclick="selectTopic('tips')">팁 / 랭킹<span class="sub">추천·비교·순위</span></button>
                    </div>`;
                document.getElementById('bc2').innerHTML = bc;
                showStep(2);
            }
        }

        function selectTopic(t) {
            if (platform === 'wordpress') {
                subtype = t;
                category = 'it';
            } else {
                category = t;
                subtype = '';
            }

            const bcItems = [
                { text: platformLabels[platform], cls: platformCrumbClass[platform] },
                { text: topicLabels[t], cls: 'crumb-default' }
            ];

            if (platform === 'tistory' || platform === 'naver') {
                // 글쓰기 모드 선택 (Step 3)
                document.getElementById('bc3').innerHTML = buildBreadcrumb(bcItems);
                showStep(3);
            } else {
                // 워드프레스: 모드 선택 건너뛰고 바로 키워드 입력
                document.getElementById('bc4').innerHTML = buildBreadcrumb(bcItems);
                document.getElementById('step4Num').textContent = '3';
                document.getElementById('step4Back').setAttribute('onclick', 'goBack(2)');
                showStep(4);
                document.getElementById('keyword').focus();
            }
        }

        function selectMode(m) {
            tone = m;
            const t = (platform === 'wordpress') ? subtype : category;
            const bcItems = [
                { text: platformLabels[platform], cls: platformCrumbClass[platform] },
                { text: topicLabels[t] || t, cls: 'crumb-default' },
                { text: modeLabels[m], cls: 'crumb-default' }
            ];
            document.getElementById('bc4').innerHTML = buildBreadcrumb(bcItems);
            document.getElementById('step4Num').textContent = '4';
            document.getElementById('step4Back').setAttribute('onclick', 'goBack(3)');
            showStep(4);
            document.getElementById('keyword').focus();
        }

        function goBack(toStep) {
            if (toStep === 1) {
                platform = '';
                category = '';
                subtype = '';
                tone = 'informative';
            }
            showStep(toStep);
        }

        document.getElementById('keyword').addEventListener('keydown', e => {
            if (e.key === 'Enter') generate();
        });

        async function generate() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) { showError('키워드를 입력해주세요.'); return; }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>생성 중... (30초~1분 소요)';
            hideError();
            document.getElementById('resultSection').classList.remove('visible');

            try {
                const res = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword, platform, tone, category, subtype })
                });
                const data = await res.json();
                if (!res.ok) { showError(data.error || '생성에 실패했습니다.'); return; }

                currentData = data;

                // 배지
                const badgesEl = document.getElementById('resultBadges');
                const pClass = platformBadgeClass[platform] || 'badge-default';
                const topicKey = subtype || category;
                badgesEl.innerHTML =
                    `<span class="badge ${pClass}">${platformLabels[platform]}</span>` +
                    `<span class="badge badge-default">${topicLabels[topicKey] || ''}</span>`;

                document.getElementById('resultTitle').textContent = data.title;
                document.getElementById('resultBody').innerHTML = data.body;

                // 태그
                const tagsEl = document.getElementById('resultTags');
                tagsEl.innerHTML = '';
                if (data.tags) {
                    data.tags.split(',').forEach(tag => {
                        const t = tag.trim();
                        if (t) {
                            const span = document.createElement('span');
                            span.textContent = '#' + t;
                            tagsEl.appendChild(span);
                        }
                    });
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-tags-btn';
                    copyBtn.textContent = '태그 복사';
                    copyBtn.onclick = copyTags;
                    tagsEl.appendChild(copyBtn);
                }

                // 제목 후보
                const tcSection = document.getElementById('titleCandidates');
                const tcContent = document.getElementById('titleCandidatesContent');
                if (data.title_candidates) {
                    tcContent.innerHTML = '';
                    data.title_candidates.split('\n').forEach(line => {
                        const l = line.trim();
                        if (l) {
                            const p = document.createElement('p');
                            p.textContent = l;
                            tcContent.appendChild(p);
                        }
                    });
                    tcSection.style.display = 'block';
                } else {
                    tcSection.style.display = 'none';
                }

                // 썸네일
                const imgSection = document.getElementById('imageSection');
                if (data.thumbnail) {
                    document.getElementById('resultImage').src = data.thumbnail;
                    imgSection.style.display = 'block';
                } else {
                    imgSection.style.display = 'none';
                }

                document.getElementById('resultSection').classList.add('visible');
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                showError('네트워크 오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                btn.textContent = '글 생성하기';
            }
        }

        function copyTitle() {
            navigator.clipboard.writeText(currentData.title || '');
            showToast('제목이 복사되었습니다');
        }
        function copyBody() {
            navigator.clipboard.writeText(currentData.body || '');
            showToast('HTML 본문이 복사되었습니다');
        }
        function copyBodyText() {
            const tmp = document.createElement('div');
            tmp.innerHTML = currentData.body || '';
            navigator.clipboard.writeText(tmp.textContent || tmp.innerText || '');
            showToast('텍스트 본문이 복사되었습니다');
        }
        function copyFullHTML() {
            let full = '';
            if (currentData.thumbnail) {
                full += '<img src="' + currentData.thumbnail + '" alt="' + (currentData.title || '') + '" style="max-width:100%;height:auto;border-radius:8px;">\n';
            }
            full += (currentData.body || '');
            navigator.clipboard.writeText(full);
            showToast('썸네일+본문 HTML이 복사되었습니다');
        }
        function copyTags() {
            if (!currentData.tags) return;
            const tagText = currentData.tags.split(',').map(t => t.trim()).filter(t => t).join(', ');
            navigator.clipboard.writeText(tagText);
            showToast('태그가 복사되었습니다');
        }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
</body>
</html>
