<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoBlog — 키워드 수집</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: #F5F1EB; font-family: 'Noto Sans KR', sans-serif; color: #141210; }

.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 44px; height: 56px;
  border-bottom: 1px solid rgba(20,18,16,0.09);
}
.brand { display: flex; align-items: baseline; gap: 9px; }
.brand-name { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 0.14em; text-decoration: none; color: #141210; }
.brand-ver { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: #9B958E; background: rgba(20,18,16,0.07); padding: 2px 7px; border-radius: 3px; }
.topbar-right { display: flex; align-items: center; gap: 24px; }
.topbar-link { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: #9B958E; text-decoration: none; }
.topbar-link:hover { color: #141210; }

.container { max-width: 1060px; margin: 0 auto; padding: 40px 24px; }

h1 { font-family: 'Bebas Neue', cursive; font-size: 36px; letter-spacing: 0.06em; margin-bottom: 8px; }
.subtitle { font-size: 13px; color: #9B958E; margin-bottom: 28px; }

/* 카테고리 */
.cat-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.cat-btn {
  font-size: 12px; font-weight: 600; padding: 8px 18px; border-radius: 20px;
  border: 1px solid rgba(20,18,16,0.15); background: #fff; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.cat-btn:hover { border-color: #141210; }
.cat-btn.active { background: #141210; color: #fff; border-color: #141210; }

/* 검색 영역 */
.search-box { display: flex; gap: 10px; margin-bottom: 12px; }
.search-input {
  flex: 1; padding: 13px 18px; border: 1px solid rgba(20,18,16,0.15);
  border-radius: 8px; font-size: 15px; font-family: inherit; background: #fff;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: #141210; }
.search-btn {
  padding: 13px 24px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
  background: #141210; color: #fff; transition: opacity 0.2s; white-space: nowrap;
}
.search-btn:hover { opacity: 0.85; }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 시드 키워드 칩 */
.seed-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; min-height: 28px; }
.seed-chip {
  font-size: 12px; padding: 4px 12px; border-radius: 14px;
  background: rgba(20,18,16,0.06); cursor: pointer; transition: all 0.15s;
}
.seed-chip:hover { background: rgba(20,18,16,0.14); }

/* 상태 / 프로그레스 */
.status { font-size: 13px; color: #9B958E; margin-bottom: 16px; min-height: 20px; }
.status.error { color: #E8470A; }
.progress-bar { height: 3px; background: rgba(20,18,16,0.08); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: #141210; border-radius: 2px; transition: width 0.3s; width: 0%; }

/* 카드 공통 */
.card {
  background: #fff; border-radius: 10px; padding: 20px 24px;
  border: 1px solid rgba(20,18,16,0.08); margin-bottom: 20px;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.card-title { font-size: 15px; font-weight: 700; }
.card-title small { font-weight: 400; color: #9B958E; font-size: 13px; }
.card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

/* 버튼 */
.btn {
  font-size: 11px; font-weight: 600; padding: 7px 14px; border-radius: 6px;
  border: 1px solid rgba(20,18,16,0.15); background: #fff; cursor: pointer; transition: all 0.15s;
}
.btn:hover { background: #141210; color: #fff; border-color: #141210; }
.btn.primary { background: #141210; color: #fff; border-color: #141210; }
.btn.primary:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* 검색량 테이블 */
.vol-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.vol-table th {
  text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #9B958E; padding: 7px 10px;
  border-bottom: 2px solid rgba(20,18,16,0.1); cursor: pointer; user-select: none;
  white-space: nowrap;
}
.vol-table th:hover { color: #141210; }
.vol-table td { padding: 7px 10px; border-bottom: 1px solid rgba(20,18,16,0.05); }
.vol-table tr { transition: background 0.12s; }
.vol-table tbody tr:hover { background: rgba(20,18,16,0.025); }
.vol-table tr.selected { background: rgba(20,18,16,0.07); }
.vol-table tr.filtered { display: none; }
.vol-num { text-align: right; font-variant-numeric: tabular-nums; }
.vol-bar-cell { width: 90px; }
.vol-bar-wrap { width: 80px; height: 6px; background: rgba(20,18,16,0.06); border-radius: 3px; overflow: hidden; }
.vol-bar { height: 100%; border-radius: 3px; background: #141210; }
.vol-high { color: #141210; font-weight: 700; }
.vol-mid { color: #6B6560; font-weight: 500; }
.vol-low { color: #B5AFA8; }
.vol-none { color: #D5D0CA; font-style: italic; }
.chk { width: 15px; height: 15px; cursor: pointer; accent-color: #141210; }
.kw-text { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 소스 그리드 */
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 640px) { .results-grid { grid-template-columns: 1fr; } }
.source-card { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid rgba(20,18,16,0.08); }
.source-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.source-count { font-size: 10px; font-weight: 400; color: #9B958E; background: rgba(20,18,16,0.05); padding: 2px 7px; border-radius: 10px; }
.kw-list { list-style: none; }
.kw-list li {
  font-size: 12px; padding: 5px 0; border-bottom: 1px solid rgba(20,18,16,0.04);
  display: flex; justify-content: space-between; align-items: center;
}
.kw-list li:last-child { border-bottom: none; }
.kw-copy-btn {
  font-size: 9px; color: #9B958E; background: none; border: 1px solid rgba(20,18,16,0.1);
  border-radius: 3px; padding: 2px 6px; cursor: pointer; transition: all 0.15s;
}
.kw-copy-btn:hover { background: #141210; color: #fff; border-color: #141210; }

/* 시즌 섹션 */
.season-section { margin-bottom: 20px; }
.season-chips { display: flex; flex-wrap: wrap; gap: 6px; }

.hidden { display: none; }

/* AI 주제 추천 */
.suggest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 640px) { .suggest-grid { grid-template-columns: 1fr; } }
.suggest-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 8px; font-size: 13px;
  background: rgba(20,18,16,0.02); border: 1px solid rgba(20,18,16,0.08);
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.suggest-item:hover { background: #141210; color: #fff; border-color: #141210; }
.suggest-item:hover .si-num { background: rgba(255,255,255,0.2); color: #fff; }
.suggest-item:hover .si-arrow { color: #fff; }
.si-num {
  width: 22px; height: 22px; border-radius: 50%; font-size: 10px; font-weight: 700;
  background: rgba(20,18,16,0.07); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.si-text { flex: 1; font-weight: 500; }
.si-arrow { color: #C4BEB8; font-size: 18px; flex-shrink: 0; transition: color 0.15s; }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(20,18,16,0.15); border-top-color: #141210;
  border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 토글 */
.toggle-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.toggle-label { font-size: 11px; color: #9B958E; display: flex; align-items: center; gap: 4px; cursor: pointer; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a class="brand-name" href="/">AutoBlog</a>
    <span class="brand-ver">Keywords</span>
  </div>
  <nav class="topbar-right">
    <a class="topbar-link" href="/">HOME</a>
    <a class="topbar-link" href="/blog">BLOG</a>
    <a class="topbar-link" href="/orders">ORDERS</a>
  </nav>
</header>

<div class="container">
  <h1>KEYWORD COLLECTOR</h1>
  <p class="subtitle">카테고리 선택 → 주제 입력 → 키워드 자동 수집 + 검색량 분석</p>

  <!-- 카테고리 선택 -->
  <div class="cat-row" id="catRow"></div>

  <!-- 검색 -->
  <div class="search-box">
    <input class="search-input" id="kwInput" type="text" placeholder="주제를 입력하세요" autofocus>
    <button class="search-btn" id="suggestBtn" onclick="suggestTopics()" style="background:#fff;color:#141210;border:1.5px solid #141210;">주제 추천받기</button>
    <button class="search-btn" id="collectBtn" onclick="collectKeywords()">수집 시작</button>
  </div>
  <div class="seed-row" id="seedRow"></div>

  <!-- AI 주제 추천 결과 -->
  <div class="card hidden" id="suggestSection">
    <div class="card-header">
      <span class="card-title" id="suggestTitle">AI 주제 추천</span>
      <div class="card-actions">
        <span style="font-size:11px;color:#9B958E;">클릭하면 바로 키워드 수집이 시작됩니다</span>
        <button class="btn" onclick="suggestTopics()">다시 추천</button>
      </div>
    </div>
    <div class="suggest-grid" id="suggestGrid"></div>
  </div>

  <!-- 시즌 키워드 (정부지원금) -->
  <div class="card season-section hidden" id="seasonalSection">
    <div class="card-header">
      <span class="card-title" id="seasonalTitle">이달의 추천 키워드</span>
    </div>
    <div class="season-chips" id="seasonalChips"></div>
  </div>

  <!-- 상태 / 프로그레스 -->
  <div class="status" id="status"></div>
  <div class="progress-bar hidden" id="progressBar"><div class="fill" id="progressFill"></div></div>

  <!-- 정제된 키워드 + 검색량 -->
  <div class="card hidden" id="refinedSection">
    <div class="card-header">
      <span class="card-title">키워드 분석 <small id="refinedCount"></small></span>
      <div class="card-actions">
        <div class="toggle-row">
          <label class="toggle-label"><input type="checkbox" id="filterLowVol" onchange="applyFilter()"> 검색량 100 이하 숨기기</label>
          <label class="toggle-label"><input type="checkbox" id="filterNoVol" onchange="applyFilter()"> 미조회 숨기기</label>
        </div>
        <button class="btn" onclick="selectAll()">전체 선택</button>
        <button class="btn" onclick="deselectAll()">선택 해제</button>
        <button class="btn" id="manualVolBtn" onclick="fetchSelectedVolume()" disabled>선택 검색량 조회</button>
        <button class="btn primary" onclick="copySelected()">복사</button>
        <button class="btn" onclick="useInWriter()">글 작성기로</button>
      </div>
    </div>
    <table class="vol-table">
      <thead><tr>
        <th style="width:30px;"><input type="checkbox" class="chk" id="chkAll" onchange="toggleAll(this.checked)"></th>
        <th onclick="sortTable('keyword')">키워드 <span class="sort-icon" data-col="keyword"></span></th>
        <th onclick="sortTable('pc')" style="text-align:right;">PC <span class="sort-icon" data-col="pc"></span></th>
        <th onclick="sortTable('mobile')" style="text-align:right;">모바일 <span class="sort-icon" data-col="mobile"></span></th>
        <th onclick="sortTable('total')" style="text-align:right;">합계 <span class="sort-icon" data-col="total"></span></th>
        <th class="vol-bar-cell"></th>
      </tr></thead>
      <tbody id="refinedBody"></tbody>
    </table>
  </div>

  <!-- 소스별 결과 -->
  <div class="results-grid hidden" id="resultsGrid">
    <div class="source-card"><div class="source-title">Google 자동완성 <span class="source-count" id="count-google-auto">0</span></div><ul class="kw-list" id="list-google-auto"></ul></div>
    <div class="source-card"><div class="source-title">Naver 자동완성 <span class="source-count" id="count-naver-auto">0</span></div><ul class="kw-list" id="list-naver-auto"></ul></div>
    <div class="source-card"><div class="source-title">Google 연관검색어 <span class="source-count" id="count-google-related">0</span></div><ul class="kw-list" id="list-google-related"></ul></div>
    <div class="source-card"><div class="source-title">Naver 연관검색어 <span class="source-count" id="count-naver-related">0</span></div><ul class="kw-list" id="list-naver-related"></ul></div>
  </div>
  <div class="results-grid hidden" id="govResultsGrid">
    <div class="source-card"><div class="source-title">Google 지원금 <span class="source-count" id="count-gov-google">0</span></div><ul class="kw-list" id="list-gov-google"></ul></div>
    <div class="source-card"><div class="source-title">Naver 지원금 <span class="source-count" id="count-gov-naver">0</span></div><ul class="kw-list" id="list-gov-naver"></ul></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const input = $('kwInput'), btn = $('collectBtn'), status = $('status');

// ── 카테고리 & 시드 ──
const CATEGORIES = {
  '여행':     { seeds: ['방콕 여행', '제주도 여행', '오사카 여행', '유럽 여행', '국내 여행지 추천'], icon: '' },
  'IT':       { seeds: ['아이폰 16', '갤럭시 S26', '노트북 추천', 'AI 활용법', '앱 추천'], icon: '' },
  '육아':     { seeds: ['신생아 용품', '어린이집 추천', '이유식 레시피', '유아 교육', '출산 준비물'], icon: '' },
  '음식':     { seeds: ['맛집 추천', '에어프라이어 레시피', '다이어트 식단', '밀키트 추천', '카페 추천'], icon: '' },
  '정부지원금': { seeds: ['청년지원금', '출산지원금', '근로장려금', '소상공인 지원금', '주거급여'], icon: '' },
  '재테크':   { seeds: ['주식 추천', 'ETF 추천', '적금 금리 비교', '부동산 투자', '청년도약계좌'], icon: '' },
  '건강':     { seeds: ['다이어트 방법', '영양제 추천', '허리 통증', '수면 개선', '건강검진 항목'], icon: '' },
};

let currentCat = '';
let refinedData = [];
let sortKey = 'total', sortAsc = false;

// 카테고리 버튼 렌더
$('catRow').innerHTML = Object.keys(CATEGORIES).map(cat =>
  `<button class="cat-btn" data-cat="${esc(cat)}" onclick="selectCat('${esc(cat)}')">${esc(cat)}</button>`
).join('');

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  const info = CATEGORIES[cat];
  $('seedRow').innerHTML = info.seeds.map(s =>
    `<span class="seed-chip" onclick="input.value='${esc(s)}'; collectKeywords();">${esc(s)}</span>`
  ).join('');
  input.placeholder = cat + ' 관련 주제를 입력하세요 (예: ' + info.seeds[0] + ')';

  // 정부지원금이면 시즌 키워드 로드
  if (cat === '정부지원금') { loadSeasonalKeywords(); }
  else { $('seasonalSection').classList.add('hidden'); }

  // 이전 결과 숨기기
  $('refinedSection').classList.add('hidden');
  $('resultsGrid').classList.add('hidden');
  $('govResultsGrid').classList.add('hidden');
  status.textContent = '';
  input.focus();
}

function loadSeasonalKeywords() {
  fetch('/api/keywords/government', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({keyword:''})
  }).then(r=>r.json()).then(data => {
    if (data.seasonal && data.seasonal.length) {
      $('seasonalTitle').textContent = data.seasonal_month + '월 추천 키워드';
      $('seasonalChips').innerHTML = data.seasonal.map(kw =>
        `<span class="seed-chip" onclick="input.value='${esc(kw)}'; collectKeywords();">${esc(kw)}</span>`
      ).join('');
      $('seasonalSection').classList.remove('hidden');
    }
  }).catch(()=>{});
}

// ── 수집 ──
async function collectKeywords() {
  const kw = input.value.trim();
  if (!kw) { input.focus(); return; }

  btn.disabled = true;
  status.className = 'status';
  status.innerHTML = '<span class="spinner"></span>키워드 수집 중...';
  $('refinedSection').classList.add('hidden');
  $('resultsGrid').classList.add('hidden');
  $('govResultsGrid').classList.add('hidden');
  $('progressBar').classList.remove('hidden');
  $('progressFill').style.width = '20%';

  const isGov = currentCat === '정부지원금';
  const apiUrl = isGov ? '/api/keywords/government' : '/api/keywords/collect';

  try {
    const resp = await fetch(apiUrl, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({keyword: kw})
    });
    const data = await resp.json();
    if (data.error) { status.className = 'status error'; status.textContent = data.error; return; }

    $('progressFill').style.width = '60%';

    // refined는 이미 검색량 포함 (상위 30개 자동 조회됨)
    refinedData = data.refined.map(item => {
      if (typeof item === 'string') return {keyword: item, pc: null, mobile: null, total: null};
      return {
        keyword: item.keyword,
        pc: item.pc || null,
        mobile: item.mobile || null,
        total: item.total || null,
      };
    });

    // 소스별 렌더
    if (isGov) {
      renderList('gov-google', data.sources.google_government || []);
      renderList('gov-naver', data.sources.naver_government || []);
      $('govResultsGrid').classList.remove('hidden');
    } else {
      renderList('google-auto', data.sources.google_autocomplete);
      renderList('naver-auto', data.sources.naver_autocomplete);
      renderList('google-related', data.sources.google_related);
      renderList('naver-related', data.sources.naver_related);
      $('resultsGrid').classList.remove('hidden');
    }

    $('progressFill').style.width = '100%';
    status.textContent = `${data.total_raw}개 수집 → ${data.total_refined}개 정제 → 검색량 조회 완료`;

    sortKey = 'total'; sortAsc = false;
    renderTable();
    $('refinedSection').classList.remove('hidden');

  } catch(e) {
    status.className = 'status error';
    status.textContent = '수집 실패: ' + e.message;
  } finally {
    btn.disabled = false;
    setTimeout(() => $('progressBar').classList.add('hidden'), 500);
  }
}

// ── 테이블 렌더 ──
function renderTable() {
  const tbody = $('refinedBody');
  const maxVol = Math.max(...refinedData.map(d => d.total || 0), 1);

  // 정렬
  const sorted = [...refinedData];
  sorted.sort((a, b) => {
    if (sortKey === 'keyword') {
      return sortAsc ? a.keyword.localeCompare(b.keyword) : b.keyword.localeCompare(a.keyword);
    }
    const va = a[sortKey] || 0, vb = b[sortKey] || 0;
    return sortAsc ? va - vb : vb - va;
  });

  tbody.innerHTML = sorted.map((d, i) => {
    const hasVol = d.total !== null && d.total !== 0;
    const barW = hasVol ? Math.max(Math.round((d.total / maxVol) * 80), 2) : 0;
    const cls = !hasVol ? 'vol-none' : d.total >= 1000 ? 'vol-high' : d.total >= 100 ? 'vol-mid' : 'vol-low';
    const pcTxt = d.pc !== null ? d.pc.toLocaleString() : '-';
    const moTxt = d.mobile !== null ? d.mobile.toLocaleString() : '-';
    const totTxt = d.total !== null ? d.total.toLocaleString() : '-';
    return `<tr data-kw="${esc(d.keyword)}" data-total="${d.total||0}">
      <td><input type="checkbox" class="chk row-chk" onchange="onRowCheck()"></td>
      <td class="kw-text">${esc(d.keyword)}</td>
      <td class="vol-num ${cls}">${pcTxt}</td>
      <td class="vol-num ${cls}">${moTxt}</td>
      <td class="vol-num ${cls}">${totTxt}</td>
      <td class="vol-bar-cell"><div class="vol-bar-wrap"><div class="vol-bar" style="width:${barW}px"></div></div></td>
    </tr>`;
  }).join('');

  applyFilter();
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('#refinedBody tr:not(.filtered)').length;
  $('refinedCount').textContent = `(${visible}/${refinedData.length}개)`;
}

// ── 정렬 ──
function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = key === 'keyword'; }

  document.querySelectorAll('.sort-icon').forEach(el => {
    el.textContent = el.dataset.col === key ? (sortAsc ? '↑' : '↓') : '';
  });
  renderTable();
}

// ── 필터 ──
function applyFilter() {
  const hideLow = $('filterLowVol').checked;
  const hideNone = $('filterNoVol').checked;
  document.querySelectorAll('#refinedBody tr').forEach(tr => {
    const t = parseInt(tr.dataset.total) || 0;
    const kw = tr.dataset.kw;
    const d = refinedData.find(x => x.keyword === kw);
    const noVol = !d || d.total === null;
    const hide = (hideLow && !noVol && t <= 100) || (hideNone && noVol);
    tr.classList.toggle('filtered', hide);
  });
  updateCount();
}

// ── 체크박스 ──
function toggleAll(checked) {
  document.querySelectorAll('#refinedBody tr:not(.filtered) .row-chk').forEach(c => c.checked = checked);
  onRowCheck();
}
function onRowCheck() {
  const any = document.querySelector('#refinedBody .row-chk:checked');
  $('manualVolBtn').disabled = !any;
}
function selectAll() { toggleAll(true); }
function deselectAll() { toggleAll(false); $('chkAll').checked = false; }

// ── 선택 키워드 검색량 수동 조회 ──
async function fetchSelectedVolume() {
  const checked = [...document.querySelectorAll('#refinedBody .row-chk:checked')];
  if (!checked.length) return;

  const keywords = checked.map(c => c.closest('tr').dataset.kw);
  $('manualVolBtn').disabled = true;
  $('manualVolBtn').textContent = '조회 중...';
  status.innerHTML = '<span class="spinner"></span>' + keywords.length + '개 키워드 검색량 조회 중...';

  try {
    const resp = await fetch('/api/keywords/search-volume', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({keywords})
    });
    const data = await resp.json();
    const volMap = {};
    (data.items || []).forEach(item => { volMap[item.keyword] = item; });

    // refinedData 업데이트
    refinedData.forEach(d => {
      if (volMap[d.keyword]) {
        d.pc = volMap[d.keyword].pc;
        d.mobile = volMap[d.keyword].mobile;
        d.total = volMap[d.keyword].total;
      }
    });

    renderTable();
    status.textContent = keywords.length + '개 키워드 검색량 업데이트 완료';
  } catch(e) {
    status.className = 'status error';
    status.textContent = '검색량 조회 실패: ' + e.message;
  } finally {
    $('manualVolBtn').textContent = '선택 검색량 조회';
    $('manualVolBtn').disabled = false;
  }
}

// ── 복사 / 글 작성기 ──
function copySelected() {
  const rows = getSelectedRows();
  if (!rows.length) { alert('키워드를 선택해주세요'); return; }
  const header = '키워드\tPC\t모바일\t합계';
  const lines = rows.map(kw => {
    const d = refinedData.find(x => x.keyword === kw);
    return kw + '\t' + (d.pc||0) + '\t' + (d.mobile||0) + '\t' + (d.total||0);
  });
  navigator.clipboard.writeText(header + '\n' + lines.join('\n')).then(() => {
    status.textContent = rows.length + '개 키워드 복사됨 (탭 구분, 엑셀 붙여넣기 가능)';
  });
}

function useInWriter() {
  const rows = getSelectedRows();
  if (!rows.length) { alert('키워드를 선택해주세요'); return; }
  const platform = currentCat === '정부지원금' ? 'wordpress' : '';
  const url = '/write?keyword=' + encodeURIComponent(rows[0]) + (platform ? '&platform=' + platform : '');
  window.location.href = url;
}

function getSelectedRows() {
  return [...document.querySelectorAll('#refinedBody .row-chk:checked')].map(c => c.closest('tr').dataset.kw);
}

// ── 소스 리스트 렌더 ──
function renderList(id, items) {
  const list = $('list-' + id), count = $('count-' + id);
  if (!list || !count) return;
  count.textContent = items.length;
  list.innerHTML = items.map(kw =>
    `<li><span>${esc(kw)}</span><button class="kw-copy-btn" onclick="copyText('${esc(kw)}',this)">복사</button></li>`
  ).join('');
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    el.textContent = 'OK'; setTimeout(() => el.textContent = '복사', 1000);
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── AI 주제 추천 ──
async function suggestTopics() {
  if (!currentCat) { alert('카테고리를 먼저 선택하세요'); return; }

  const suggestBtn = $('suggestBtn');
  suggestBtn.disabled = true;
  suggestBtn.textContent = '추천 중...';
  status.innerHTML = '<span class="spinner"></span>AI가 ' + currentCat + ' 롱테일 키워드 주제를 분석하는 중...';
  $('suggestSection').classList.add('hidden');

  try {
    const resp = await fetch('/api/keywords/suggest-topics', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({category: currentCat})
    });
    const data = await resp.json();
    if (data.error) { status.className = 'status error'; status.textContent = data.error; return; }

    const topics = data.topics || [];
    $('suggestTitle').textContent = currentCat + ' 추천 주제 ' + topics.length + '개';
    $('suggestGrid').innerHTML = topics.map((t, i) =>
      `<div class="suggest-item" onclick="input.value='${esc(t)}'; collectKeywords();">
        <span class="si-num">${i + 1}</span>
        <span class="si-text">${esc(t)}</span>
        <span class="si-arrow">&#8250;</span>
      </div>`
    ).join('');
    $('suggestSection').classList.remove('hidden');
    status.textContent = topics.length + '개 주제 추천 완료 — 클릭하면 바로 키워드 수집이 시작됩니다';

  } catch(e) {
    status.className = 'status error';
    status.textContent = '주제 추천 실패: ' + e.message;
  } finally {
    suggestBtn.disabled = false;
    suggestBtn.textContent = '주제 추천받기';
  }
}

// ── 키보드 ──
input.addEventListener('keydown', e => { if (e.key === 'Enter') collectKeywords(); });

// 기본 카테고리 선택
selectCat('여행');
</script>
